<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evan's Routine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-layout">
        <div class="container">
            <h1>Weekly Routine</h1>

            <div class="legend" id="legend"></div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="time-col">Time</th>
                            {% for day in days %}
                            <th class="{% if day == current_day %}current-day{% endif %}">{{ day[:3] }}</th>
                            {% endfor %}
                        </tr>
                    </thead>
                    <tbody id="schedule-body"></tbody>
                </table>
            </div>
        </div>

        <aside class="sidebar">
            <div class="clock-panel">
                <h2>Clocks</h2>
                <div class="clock-card">
                    <span class="clock-label">New York</span>
                    <span class="clock-time" id="clock-ny">--:--:-- --</span>
                </div>
                <div class="clock-card">
                    <span class="clock-label">Dhaka</span>
                    <span class="clock-time" id="clock-dhaka">--:--:-- --</span>
                </div>
            </div>

            <div class="converter-panel">
                <h2>NY → Dhaka Converter</h2>
                <div class="converter-input-group">
                    <label for="conv-input">New York Time</label>
                    <input type="time" id="conv-input" value="12:00" />
                </div>
                <div class="converter-result">
                    <span class="converter-label">Dhaka Time</span>
                    <span class="converter-time" id="conv-output">--:-- --</span>
                </div>
            </div>
        </aside>
    </div>

    <!-- Modal for creating/editing -->
    <div class="modal-overlay" id="modal" style="display:none">
        <div class="modal">
            <h3 id="modal-title">Add Activity</h3>
            <p id="modal-info"></p>
            <input type="text" id="modal-input" placeholder="Activity name" autocomplete="off" />
            <div class="modal-suggestions" id="modal-suggestions"></div>
            <div class="modal-actions">
                <button class="btn btn-cancel" id="modal-cancel">Cancel</button>
                <button class="btn btn-delete" id="modal-delete" style="display:none">Delete</button>
                <button class="btn btn-save" id="modal-save">Save</button>
            </div>
        </div>
    </div>

    <script>
    const DAYS = {{ days | tojson }};
    const TIME_SLOTS = {{ time_slots | tojson }};
    const COLORS = {{ colors | tojson }};
    const CURRENT_DAY = {{ current_day | tojson }};
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
